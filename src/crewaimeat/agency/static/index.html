<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>aimeat-agency</title>
<style>
  :root {
    --bg:#0a0a1a; --panel:rgba(255,255,255,.04); --panel2:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.10); --brand:#ff69b4; --accent:#a78bfa;
    --txt:#e8e8f0; --muted:#9aa0b4; --ok:#4ade80; --warn:#fbbf24; --bad:#ef4444;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  a { color:var(--accent); }
  header { position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:18px;
    padding:12px 20px; background:rgba(10,10,26,.92); border-bottom:1px solid var(--border); backdrop-filter:blur(8px); }
  .brand { font-weight:700; color:var(--brand); letter-spacing:.3px; }
  nav { display:flex; gap:6px; flex:1; }
  nav button { background:transparent; border:1px solid transparent; color:var(--muted);
    padding:6px 12px; border-radius:8px; cursor:pointer; font-size:13px; }
  nav button.active { color:var(--txt); background:var(--panel2); border-color:var(--border); }
  nav button:hover { color:var(--txt); }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--bad); display:inline-block; }
  .dot.ok { background:var(--ok); box-shadow:0 0 8px var(--ok); }
  select.lang { background:var(--panel); color:var(--txt); border:1px solid var(--border); border-radius:8px; padding:4px 8px; }
  main { max-width:1000px; margin:0 auto; padding:22px 20px 60px; }
  h2 { font-size:18px; margin:4px 0 14px; }
  .sub { color:var(--muted); font-size:13px; margin:-8px 0 18px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; }
  .card h3 { margin:0 0 6px; font-size:15px; }
  .card p { color:var(--muted); margin:0 0 14px; font-size:13px; min-height:34px; }
  button.btn { background:linear-gradient(135deg,var(--brand),var(--accent)); color:#160a16; border:0;
    padding:8px 14px; border-radius:9px; cursor:pointer; font-weight:600; font-size:13px; }
  button.ghost { background:var(--panel2); color:var(--txt); border:1px solid var(--border); }
  button.btn:hover { filter:brightness(1.07); }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  label { display:block; color:var(--muted); font-size:12px; margin:12px 0 4px; }
  input, textarea, select.f { width:100%; background:#0e0e22; color:var(--txt); border:1px solid var(--border);
    border-radius:9px; padding:9px 11px; font:inherit; }
  textarea { min-height:120px; resize:vertical; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; }
  .pill { padding:2px 9px; border-radius:999px; font-size:12px; border:1px solid var(--border); }
  .pill.running, .pill.published { color:var(--ok); border-color:rgba(74,222,128,.4); }
  .pill.down, .pill.raw { color:var(--muted); }
  .pill.stale-heartbeat, .pill.orphan { color:var(--warn); border-color:rgba(251,191,36,.4); }
  .pill.DUPLICATE, .pill.zombie { color:var(--bad); border-color:rgba(239,68,68,.4); }
  pre { background:#0e0e22; border:1px solid var(--border); border-radius:10px; padding:12px; overflow:auto;
    font-size:12px; white-space:pre-wrap; }
  .muted { color:var(--muted); }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--panel2);
    border:1px solid var(--border); padding:10px 16px; border-radius:10px; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
  .spacer { flex:1; }
  .back { color:var(--muted); cursor:pointer; font-size:13px; }
  .spin { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--brand);
    border-radius:50%; display:inline-block; animation:sp .8s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .pill.run { color:var(--ok); border-color:rgba(74,222,128,.4); }
  .pill.wait { color:var(--warn); border-color:rgba(251,191,36,.4); }
  .pill.off { color:var(--muted); }
  .md { line-height:1.6; } .md h1,.md h2,.md h3,.md h4 { margin:14px 0 6px; }
  .md h1 { font-size:20px; } .md h2 { font-size:17px; } .md h3 { font-size:15px; }
  .md p { margin:8px 0; } .md ul { margin:8px 0 8px 18px; } .md li { margin:3px 0; }
  .md code { background:#0e0e22; padding:1px 5px; border-radius:5px; font-size:12px; }
  .md pre { background:#0e0e22; border:1px solid var(--border); border-radius:8px; padding:10px; overflow:auto; }
  .md a { word-break:break-all; }
</style>
</head>

<header>

<div id="updatebar"></div>
<main id="main"></main>
<div class="toast" id="toast"></div>

async function api(path, opts={}) {
  const r = await fetch(path, {...opts, headers:{"Authorization":"Bearer "+TOKEN,
    ...(opts.body?{"Content-Type":"application/json"}:{}), ...(opts.headers||{})}});
  if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||r.statusText); }
  return r.status===204 ? null : r.json();
}
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2200); }
// NB: a <template> parses ANY fragment incl. <tr>/<td> (a <div> silently drops table rows → null).
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

const VIEWS = ["setup","gallery","fleet","memory","sync"];
let view = "gallery", editing = null, editorStream = null, latestState = null, skipSetup = false;
let wizardStarted = false, pendingAuth = null;   // wizard: intro shown? + in-flight device-auth (survives re-render)

function renderNav(){
  const nav=document.getElementById("nav"); nav.innerHTML="";
  VIEWS.forEach(v=>{ const b=el(`<button>${t("nav."+v)}</button>`);
    if(v===view) b.classList.add("active"); b.onclick=()=>{ view=v; editing=null; render(); }; nav.appendChild(b); });
}

async function render(){
  if(editorStream){ editorStream.close(); editorStream=null; }   // close the Manage-page live stream on nav
  latestState=null;
  renderNav();
  const m=document.getElementById("main"); m.innerHTML="<p class='muted'>…</p>";
  try {
    if (editing!==null) return renderEditor(m);
    if (view==="setup") return renderSetup(m);          // the guided first-run wizard (full checklist + gated steps)
    if (view==="gallery") return renderGallery(m);
    if (view==="fleet") return renderFleet(m);
    if (view==="memory") return renderMemory(m);
    if (view==="sync") return renderSync(m);
  } catch(e){ m.innerHTML=`<p class='muted'>Error: ${esc(e.message)}</p>`; }
}

function renderConnect(m, acc){
  m.innerHTML=`<h2>${t("connect.title")}</h2><div class="sub">${t("connect.sub")}</div>`;
  const form=el(`<div class="card" style="max-width:480px"></div>`);
  form.appendChild(el(`<label>${t("owner")}</label>`));
  const owner=el(`<input placeholder="e.g. happydude500001" value="${esc(acc.owner||"")}">`); form.appendChild(owner);
  form.appendChild(el(`<label>${t("node")}</label>`));
  const node=el(`<input value="${esc(acc.node||"https://aimeat.io")}">`); form.appendChild(node);
  const btn=el(`<button class="btn" style="margin-top:16px">${t("connectbtn")}</button>`);
  btn.onclick=async()=>{ const o=owner.value.trim(); if(!o) return toast(t("owner"));
    try{ await api("/api/account/connect",{method:"POST",body:JSON.stringify({owner:o,node:node.value.trim()})});
      toast(t("approveddone").split("!")[0]); pollAccount(); render(); }catch(e){ toast(e.message); } };
  form.appendChild(btn); m.appendChild(form);
}

// Open in the operator's real browser. The cockpit (a local process) does it, so this works inside the
// Tauri shell too — its webview silently swallows window.open. Falls back to window.open in a plain browser.
async function openExt(url){ try{ await api("/api/open",{method:"POST",body:JSON.stringify({url})}); }catch(e){ try{ window.open(url,"_blank"); }catch{} } }
// Catch every <a href="http…"> (incl. links inside i18n strings) and route it through openExt.
document.addEventListener("click", (e)=>{ const a=e.target.closest && e.target.closest('a[href^="http"]'); if(a){ e.preventDefault(); openExt(a.getAttribute("href")); } });

async function renderSetup(m){
  let s; try{ s=await api("/api/setup/status"); }catch(e){ m.innerHTML=`<p class="muted">${esc(e.message)}</p>`; return; }
  const steps=[
    {key:"account", title:t("w.account"), done:s.owner_set},
    {key:"model",   title:t("w.model"),   done:s.ollama.has_gemma4||s.openrouter_key},
    {key:"agent",   title:t("w.agent"),   done:s.brain_count>0},
    {key:"approve", title:t("w.approve"), done:s.first_agent_connected},
    {key:"start",   title:t("w.start"),   done:s.first_agent_running},
  ];
  const cur=steps.findIndex(x=>!x.done);
  // Intro (first run, nothing done yet): pick the LANGUAGE first, see the whole plan, then Begin.
  if(cur===0 && !wizardStarted){
    m.innerHTML=`<h2>${t("w.title")}</h2><div class="sub">${t("w.sub")}</div>`;
    const card=el(`<div class="card" style="max-width:560px"></div>`);
    card.appendChild(el(`<label>${t("w.chooselang")}</label>`));
    const langSel=el(`<select class="f" style="max-width:220px"><option value="en" ${LANG==="en"?"selected":""}>English</option><option value="fi" ${LANG==="fi"?"selected":""}>Suomi</option></select>`);
    langSel.onchange=()=>{ LANG=langSel.value; localStorage.setItem("agencyLang",LANG); const h=document.getElementById("lang"); if(h) h.value=LANG; pollAccount(); renderSetup(m); };
    card.appendChild(langSel);
    card.appendChild(el(`<div class="muted" style="font-size:12px;margin-top:6px">${t("w.langnote")}</div>`));
    card.appendChild(el(`<div style="margin-top:16px"><b>${t("w.whatscoming")}</b></div>`));
    const ul=el(`<div style="margin-top:6px"></div>`);
    steps.forEach((st,i)=> ul.appendChild(el(`<div class="muted" style="padding:3px 0">${i+1}. ${esc(st.title)}</div>`)));
    card.appendChild(ul);
    const begin=el(`<button class="btn" style="margin-top:16px">${t("w.begin")}</button>`);
    begin.onclick=()=>{ wizardStarted=true; renderSetup(m); };
    card.appendChild(begin); m.appendChild(card); return;
  }
  m.innerHTML=`<h2>${t("w.title")}</h2><div class="sub">${t("w.sub")}</div>`;
  // the FULL checklist, always visible, so the user sees what's coming
  const list=el(`<div class="card" style="max-width:560px;margin-bottom:14px"></div>`);
  steps.forEach((st,i)=>{ const cl=st.done?"var(--ok)":(i===cur?"var(--brand)":"var(--muted)"); const ic=st.done?"✓":(i===cur?"▶":"○");
    list.appendChild(el(`<div style="padding:5px 0;color:${cl}"><b style="display:inline-block;width:22px">${ic}</b> ${i+1}. ${esc(st.title)}</div>`)); });
  m.appendChild(list);
  if(cur===-1){ const c=el(`<div class="card" style="max-width:560px"><h3>${t("w.done")}</h3><p class="muted">${t("w.done.sub")}</p></div>`);
    const b=el(`<button class="btn">${t("w.open")}</button>`); b.onclick=()=>{ skipSetup=true; openEditor(s.first_agent); }; c.appendChild(b); m.appendChild(c);
    m.appendChild(el(`<div style="margin-top:10px"><a class="muted" style="cursor:pointer" onclick="skipSetup=true;view='gallery';render()">${t("nav.gallery")} →</a></div>`)); return; }
  const panel=el(`<div class="card" style="max-width:660px"></div>`); m.appendChild(panel);
  setupStep(panel, steps[cur].key, s, ()=>renderSetup(m));
  m.appendChild(el(`<div style="margin-top:14px"><a class="muted" style="cursor:pointer;font-size:13px" onclick="skipSetup=true;view='gallery';render()">${t("w.skip")}</a></div>`));
}

async function setupStep(p, key, s, refresh){
  if(key==="account"){
    p.innerHTML=`<h3>1. ${t("w.account")}</h3><p class="muted">${t("w.account.desc")}</p>`;
    p.appendChild(el(`<label>${t("w.lbl.account")}</label>`)); const o=el(`<input placeholder="e.g. happydude500001" value="${esc(s.owner||"")}">`); p.appendChild(o);
    p.appendChild(el(`<label>${t("w.lbl.node")}</label>`)); const n=el(`<input value="${esc(s.node||"https://aimeat.io")}">`); p.appendChild(n);
    const b=el(`<button class="btn" style="margin-top:12px">${t("w.next")}</button>`);
    b.onclick=async()=>{ const ov=o.value.trim(); if(!ov) return toast(t("w.err.account"));
      try{ await api("/api/account/connect",{method:"POST",body:JSON.stringify({owner:ov,node:n.value.trim()})}); pollAccount(); refresh(); }catch(e){ toast(e.message); } };
    p.appendChild(b); p.appendChild(el(`<div style="margin-top:10px;font-size:13px"><a href="https://aimeat.io" target="_blank">${t("w.noacct")}</a></div>`));
  }
  else if(key==="model"){
    p.innerHTML=`<h3>2. ${t("w.model")}</h3><p class="muted">${t("w.model.desc")}</p>`;
    if(!s.ollama.running){
      p.appendChild(el(`<p>${t("w.ollama.install")}</p>`));
      const dl=el(`<button class="btn">${t("w.installollama")}</button>`); dl.onclick=()=>openExt("https://ollama.com/download");
      const rc=el(`<button class="btn ghost" style="margin-left:8px">${t("w.recheck")}</button>`); rc.onclick=refresh;
      const r=el(`<div class="row" style="margin-top:6px"></div>`); r.appendChild(dl); r.appendChild(rc); p.appendChild(r);
    } else if(!s.ollama.has_gemma4){
      p.appendChild(el(`<p>${t("w.gemma.desc")}</p>`));
      const slot=el(`<div style="margin-top:8px"></div>`);
      const g=el(`<button class="btn">${t("w.getgemma")}</button>`);
      g.onclick=async()=>{ g.disabled=true; try{ await api("/api/ollama/pull",{method:"POST",body:JSON.stringify({model:"gemma4"})});
        slot.innerHTML=`<div class="row"><span class="spin"></span> <span class="muted">${t("w.downloading")}</span></div>`;
        const iv=setInterval(async()=>{ try{ const st=await api("/api/setup/status"); if(st.ollama.has_gemma4){ clearInterval(iv); refresh(); } }catch{} }, 5000);
      }catch(e){ g.disabled=false; toast(e.message); } };
      p.appendChild(g); p.appendChild(slot);
    } else {
      p.appendChild(el(`<p style="color:var(--ok)">${t("w.localready")}</p>`));
      const b=el(`<button class="btn">${t("w.next")}</button>`); b.onclick=refresh; p.appendChild(b);
    }
    const adv=el(`<details style="margin-top:18px"><summary class="muted" style="cursor:pointer">${t("w.advanced")}</summary></details>`);
    const body=el(`<div style="margin-top:10px"></div>`);
    body.appendChild(el(`<p class="muted" style="border-left:3px solid var(--ok);padding-left:10px">${t("w.or.free")}</p>`));
    body.appendChild(el(`<p class="muted">${t("w.or.desc")}${s.openrouter_key?t("w.or.saved"):""}</p>`));
    body.appendChild(el(`<p class="muted">${t("w.or.howto")}</p>`));
    const getkey=el(`<button class="btn ghost">${t("w.or.getkey")}</button>`); getkey.onclick=()=>openExt("https://openrouter.ai/keys"); body.appendChild(getkey);
    const k=el(`<input placeholder="sk-or-..." style="margin-top:10px">`); body.appendChild(k);
    const sk=el(`<button class="btn ghost" style="margin-top:8px">${t("w.savekey")}</button>`);
    sk.onclick=async()=>{ const kv=k.value.trim(); if(!kv) return; try{ await api("/api/setup/openrouter-key",{method:"POST",body:JSON.stringify({key:kv})}); toast(t("w.saved")); refresh(); }catch(e){ toast(e.message); } };
    body.appendChild(sk); adv.appendChild(body); p.appendChild(adv);
  }
  else if(key==="agent"){
    p.innerHTML=`<h3>3. ${t("w.agent")}</h3><p class="muted">${t("w.agent.desc")}</p>`;
    p.appendChild(el(`<label>${t("w.lbl.agentname")}</label>`)); const nm=el(`<input placeholder="e.g. news-watcher">`); p.appendChild(nm);
    p.appendChild(el(`<label>${t("w.lbl.dowhat")}</label>`));
    const pr=el(`<textarea>${t("w.defaultprose")}</textarea>`); p.appendChild(pr);
    const b=el(`<button class="btn" style="margin-top:12px">${t("w.next")}</button>`);
    b.onclick=async()=>{ const an=nm.value.trim(); if(!an) return toast(t("w.err.name")); b.disabled=true;
      try{ const [tpls,models]=await Promise.all([api("/api/templates?lang="+LANG), api("/api/models").catch(()=>({models:[]}))]);
        const tp=(tpls.templates||[]).find(x=>x.id==="topic-watcher");
        const gem=(models.models||[]).find(x=>x.local && x.id.startsWith("gemma4"));
        const policy={...(tp?tp.default_policy:{}), model: gem?gem.spec:null};
        await api("/api/brains",{method:"POST",body:JSON.stringify({agent_name:an,template_id:"topic-watcher",prose:pr.value,policy})}); refresh();
      }catch(e){ b.disabled=false; toast(e.message); } };
    p.appendChild(b);
  }
  else if(key==="approve"){
    const agent=s.first_agent;
    p.innerHTML=`<h3>4. ${t("w.approve")}</h3><p class="muted">${t("w.approve.desc")}</p>`;
    const slot=el(`<div></div>`); p.appendChild(slot);
    // Render the code panel + poll. Reused on first click AND on re-entry (e.g. after a language switch),
    // so an in-flight approval is never lost.
    const showCode=(d)=>{
      pendingAuth={agent, code:d.code, verify_url:d.verify_url};
      slot.innerHTML="";
      slot.appendChild(el(`<div class="card" style="margin-top:10px"><div><label>${t("code")} (${t("w.copied")})</label><div style="font-size:24px;font-weight:700;letter-spacing:2px">${esc(d.code||"—")}</div></div><div class="muted" style="margin-top:8px">${t("approveinstr")} <a href="${esc(d.verify_url||'#')}">${esc(d.verify_url||'')}</a></div></div>`));
      const od=el(`<button class="btn ghost" style="margin-top:8px">${t("w.opendash")}</button>`); od.onclick=()=>openExt(d.verify_url); slot.appendChild(od);
      slot.appendChild(el(`<div class="row" style="margin-top:10px"><span class="spin"></span> <span class="muted">${t("waiting")}</span></div>`));
      if(window._authIv) clearInterval(window._authIv);
      window._authIv=setInterval(async()=>{ try{ const a=await api("/api/agents/"+encodeURIComponent(agent)+"/auth-status"); if(a.authorized){ clearInterval(window._authIv); pendingAuth=null; refresh(); } }catch{} }, 4000);
    };
    if(pendingAuth && pendingAuth.agent===agent){ showCode(pendingAuth); }
    else {
      const go=el(`<button class="btn">${t("w.approve")}</button>`);
      go.onclick=async()=>{ go.disabled=true; slot.innerHTML=`<div class="row" style="margin-top:10px"><span class="spin"></span> <span class="muted">${t("connecting")}</span></div>`;
        try{ const d=await api("/api/agents/"+encodeURIComponent(agent)+"/register",{method:"POST"});
          if(d.code) try{ navigator.clipboard.writeText(d.code); }catch{}
          if(d.verify_url) openExt(d.verify_url);
          showCode(d);
        }catch(e){ go.disabled=false; toast(e.message); } };
      p.appendChild(go);
    }
  }
  else if(key==="start"){
    const agent=s.first_agent;
    p.innerHTML=`<h3>5. ${t("w.start")}</h3><p class="muted">${t("w.start.desc")}</p>`;
    const b=el(`<button class="btn">${t("start")}</button>`);
    b.onclick=async()=>{ b.disabled=true;
      let dots=1; const anim=setInterval(()=>{ b.textContent=".".repeat(dots); dots=dots%3+1; }, 350);  // "live" working indicator
      const stop=()=>{ clearInterval(anim); };
      try{ await api("/api/fleet/"+encodeURIComponent(agent)+"/start",{method:"POST"});
        let n=0; const iv=setInterval(async()=>{ n++; try{ const st=await api("/api/setup/status"); if(st.first_agent_running||n>20){ clearInterval(iv); stop(); refresh(); } }catch{} }, 3000);
      }catch(e){ stop(); b.disabled=false; b.textContent=t("start"); toast(e.message); } };
    p.appendChild(b);
  }
}

async function renderGallery(m){
  const [tpls, brains] = await Promise.all([api("/api/templates?lang="+LANG), api("/api/brains")]);
  m.innerHTML=`<h2>${t("gallery.title")}</h2><div class="sub">${t("gallery.sub")}</div>`;
  const g=el(`<div class="grid"></div>`);
  tpls.templates.forEach(tp=>{
    const c=el(`<div class="card"><h3>${esc(tp.title)}</h3><p>${esc(tp.description)}</p></div>`);
    const b=el(`<button class="btn">${t("use")}</button>`);
    b.onclick=()=>{ editing={isNew:true, template:tp, brain:{agent_name:"", template_id:tp.id, prose:tp.default_prose, policy:tp.default_policy, title:tp.title}}; render(); };
    c.appendChild(b); g.appendChild(c);
  });
  m.appendChild(g);
  m.appendChild(el(`<h2 style="margin-top:28px">${t("gallery.your")}</h2>`));
  if(!brains.brains.length){ m.appendChild(el(`<p class="muted">${t("noagents")}</p>`)); return; }
  const g2=el(`<div class="grid"></div>`);
  brains.brains.forEach(b=>{
    const c=el(`<div class="card"><h3>${esc(b.agent_name)}</h3><p>${esc((b.prose||"").slice(0,90))}</p></div>`);
    const r=el(`<div class="row"></div>`);
    const eb=el(`<button class="btn ghost">${t("manage")}</button>`); eb.onclick=()=>openEditor(b.agent_name);
    r.appendChild(eb); c.appendChild(r); g2.appendChild(c);
  });
  m.appendChild(g2);
}

async function openEditor(agent){ const b=await api("/api/brains/"+encodeURIComponent(agent));
  const tpls=await api("/api/templates?lang="+LANG); const tp=tpls.templates.find(x=>x.id===b.template_id);
  editing={isNew:false, template:tp, brain:b}; render(); }

function renderEditor(m){
  const {isNew, brain} = editing; const p=brain.policy||{};
  m.innerHTML="";
  const back=el(`<div class="back">← ${t("nav.gallery")}</div>`); back.onclick=()=>{ editing=null; view="gallery"; render(); };
  m.appendChild(back);
  const who = isNew ? (brain.title||brain.template_id) : (t("manage")+": "+brain.agent_name);
  m.appendChild(el(`<h2>${esc(who)} <span class="muted" style="font-size:13px">· ${esc(brain.template_id)}${brain.version?(" · v"+brain.version):""}</span> <span id="authbadge"></span> <span id="runbadge"></span></h2>`));
  const authState = {authorized:false};
  const form=el(`<div class="card"></div>`);
  form.appendChild(el(`<label>${t("agentname")}</label>`));
  const name=el(`<input ${isNew?"":"disabled"} value="${esc(brain.agent_name)}" placeholder="e.g. news-watcher-1">`); form.appendChild(name);
  form.appendChild(el(`<label>${t("prose")}</label>`));
  const prose=el(`<textarea>${esc(brain.prose||"")}</textarea>`); form.appendChild(prose);
  form.appendChild(el(`<label>${t("policy")}</label>`));
  const pr=el(`<div class="row" style="gap:14px"></div>`);
  const autonomy=el(`<div style="flex:1;min-width:140px"><label>${t("autonomy")}</label><select class="f" id="pa">
    ${["act","draft","ask","off"].map(a=>`<option ${p.autonomy===a?"selected":""}>${a}</option>`).join("")}</select></div>`);
  const sched=el(`<div style="flex:1;min-width:160px"><label>${t("schedule")}</label><input class="f" id="ps" value="${esc((p.schedule||{}).cron||"")}"></div>`);
  const vis=el(`<div style="flex:1;min-width:120px"><label>${t("visibility")}</label><select class="f" id="pv">
    ${["owner","public"].map(a=>`<option ${p.visibility===a?"selected":""}>${a}</option>`).join("")}</select></div>`);
  const modelBox=el(`<div style="flex:1;min-width:220px"><label>${t("model")}</label><select class="f" id="pm"><option value="">${esc(t("model.default"))}</option></select></div>`);
  pr.appendChild(autonomy); pr.appendChild(sched); pr.appendChild(vis); pr.appendChild(modelBox); form.appendChild(pr);
  form.appendChild(el(`<label>${t("publishkey")}</label>`));
  const pk=el(`<input value="${esc(p.publish_key||"")}" placeholder="blank = auto from agent name">`); form.appendChild(pk);
  form.appendChild(el(`<label>${t("keymode")}</label>`));
  const km=el(`<select class="f" id="pkm" style="max-width:340px">${["latest","date","timestamp"].map(x=>`<option value="${x}" ${(p.key_mode||"date")===x?"selected":""}>${t("keymode."+x)}</option>`).join("")}</select>`);
  form.appendChild(km);
  m.appendChild(form);
  const offerBox=el(`<div id="offerbox"></div>`); m.appendChild(offerBox);
  if(!isNew) loadOffer(offerBox, m, brain.agent_name, authState);

  // model picker — async catalogue; preserve the brain's current model until it loads (don't clobber on save)
  let modelsLoaded=false; const modelSpecs={};
  (async()=>{ try{ const mm=await api("/api/models"); const sel=form.querySelector("#pm");
    const cur=(p.model&&p.model.label)||"";
    const addGroup=(label,arr)=>{ if(!arr.length) return; const og=el(`<optgroup label="${esc(label)}"></optgroup>`);
      arr.forEach(x=>{ modelSpecs[x.label]=x.spec; og.appendChild(el(`<option ${x.label===cur?"selected":""}>${esc(x.label)}</option>`)); }); sel.appendChild(og); };
    addGroup(t("model.local"), mm.models.filter(x=>x.local)); addGroup(t("model.cloud"), mm.models.filter(x=>!x.local));
    modelsLoaded=true; }catch{} })();
  const collectModel=()=>{ if(!modelsLoaded) return p.model||null; const v=form.querySelector("#pm").value; return v?(modelSpecs[v]||null):null; };

  const collectPolicy=()=>({...p, autonomy:form.querySelector("#pa").value,
    schedule:{...(p.schedule||{}), cron:form.querySelector("#ps").value}, visibility:form.querySelector("#pv").value,
    publish_key:pk.value, key_mode:form.querySelector("#pkm").value, model:collectModel()});

  const bar=el(`<div class="row" style="margin-top:16px"></div>`);
  const save=el(`<button class="btn">${t("save")}</button>`);
  save.onclick=async()=>{ try{
    if(isNew){ const an=name.value.trim(); if(!an) return toast("agent name required");
      await api("/api/brains",{method:"POST",body:JSON.stringify({agent_name:an,template_id:brain.template_id,prose:prose.value,policy:collectPolicy(),title:brain.title})});
    } else { await api("/api/brains/"+encodeURIComponent(brain.agent_name),{method:"PATCH",body:JSON.stringify({prose:prose.value,policy:collectPolicy()})}); }
    toast(t("saved")); openEditor(isNew?name.value.trim():brain.agent_name);
  }catch(e){ toast(e.message); } };
  bar.appendChild(save);

  if(!isNew){
    const dry=el(`<button class="btn ghost" title="${t("dryrunhint")}">${t("dryrun")}</button>`);
    dry.onclick=async()=>{ try{ const d=await api("/api/brains/"+encodeURIComponent(brain.agent_name)+"/dry-run"); showPreview(m,d); }catch(e){ toast(e.message); } };
    const hist=el(`<button class="btn ghost">${t("history")}</button>`);
    hist.onclick=async()=>{ try{ const h=await api("/api/agents/"+encodeURIComponent(brain.agent_name)+"/activity"); showActivity(m,brain.agent_name,h.events); }catch(e){ toast(e.message); } };
    const logs=el(`<button class="btn ghost">${t("logs")}</button>`);
    logs.onclick=async()=>{ try{ const l=await api("/api/fleet/"+encodeURIComponent(brain.agent_name)+"/logs"); showLogs(m,l); }catch(e){ toast(e.message); } };
    const approve=el(`<button class="btn">${t("approve")}</button>`);
    approve.onclick=async()=>{ approve.disabled=true;
      const out=m.querySelector("#editorout"); out.innerHTML=`<div class="card"><div class="row"><span class="spin"></span> <span>${t("connecting")}</span></div></div>`;
      try{ const d=await api("/api/agents/"+encodeURIComponent(brain.agent_name)+"/register",{method:"POST"});
        showApprove(m, brain.agent_name, d, authState); }catch(e){ out.innerHTML=`<p class="muted">${esc(e.message)}</p>`; toast(e.message); }
      finally{ approve.disabled=false; } };
    const test=el(`<button class="btn ghost" title="${t("testrunhint")}">${t("testrun")}</button>`);
    test.onclick=()=>showTestRun(m, brain.agent_name, authState);
    const tasks=el(`<button class="btn ghost">${t("tasks")}</button>`);

// minimal, dependency-free markdown -> HTML (headings, lists, code fences, bold/italic/code, links).
function mdInline(s){
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\*([^*]+)\*/g,'<i>$1</i>');
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  s=s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g,'$1<a href="$2" target="_blank">$2</a>');
  return s;
}
function mdRender(src){
  if(typeof src!=="string") src=JSON.stringify(src,null,2);
  const lines=src.replace(/\r\n/g,"\n").split("\n"); let html="",inList=false,inCode=false,code="";
  const closeList=()=>{ if(inList){ html+="</ul>"; inList=false; } };
  for(const ln of lines){
    if(/^```/.test(ln)){ if(inCode){ html+=`<pre>${esc(code)}</pre>`; code=""; inCode=false; } else { closeList(); inCode=true; } continue; }
    if(inCode){ code+=ln+"\n"; continue; }
    const h=ln.match(/^(#{1,6})\s+(.*)$/); if(h){ closeList(); html+=`<h${h[1].length}>${mdInline(h[2])}</h${h[1].length}>`; continue; }
    const li=ln.match(/^\s*[-*]\s+(.*)$/); if(li){ if(!inList){ html+="<ul>"; inList=true; } html+=`<li>${mdInline(li[1])}</li>`; continue; }
    if(ln.trim()===""){ closeList(); continue; }
    closeList(); html+=`<p>${mdInline(ln)}</p>`;
  }
  if(inCode) html+=`<pre>${esc(code)}</pre>`; closeList();
  return `<div class="md">${html}</div>`;
}

  out.innerHTML=""; const back=el(`<div class="back">← ${t("sync.title")}</div>`); back.onclick=()=>loadSync(out, agent); out.appendChild(back);
  const when=p.updated?(" · "+new Date(p.updated).toLocaleString()):"";
  out.appendChild(el(`<div class="card" style="margin:10px 0"><div style="font-family:monospace;word-break:break-all">${esc(p.key)}</div><div class="muted" style="font-size:12px">${esc(p.visibility||"")}${when}</div></div>`));
  const slot=el(`<div class="muted">…</div>`); out.appendChild(slot);
  try{ const r=await api("/api/agents/"+encodeURIComponent(agent)+"/key?key="+encodeURIComponent(p.key));
    slot.innerHTML=""; slot.appendChild(el(mdRender(r.value||"(empty)")));
  }catch(e){ slot.innerHTML=`<p class="muted">${esc(e.message)}</p>`; }
}

async function pollHealth(){
  try{ const h=await fetch("/healthz").then(r=>r.json()); document.getElementById("healthdot").classList.toggle("ok",!!h.ok);
    document.getElementById("healthtxt").textContent="cockpit "+h.version; }
  catch{ document.getElementById("healthdot").classList.remove("ok"); document.getElementById("healthtxt").textContent="offline"; }
}
async function pollAccount(){
  const a=document.getElementById("account");
  try{ const acc=await api("/api/account");
    a.textContent = acc.owner ? `${acc.owner} @ ${(acc.node||"").replace(/^https?:\/\//,"")}` : t("notconnected");
    a.title = acc.connected ? `${acc.registered_agents} ${t("nav.fleet")}` : t("notconnected");
  }catch{ a.textContent=""; }
}

document.getElementById("lang").value=LANG;
document.getElementById("lang").onchange=e=>{ LANG=e.target.value; localStorage.setItem("agencyLang",LANG); pollAccount(); renderChrome(); render(); };

// Header shutdown button: stop all agents safely, then the app closes itself (the Tauri shell quits when
// the cockpit exits). In a plain browser it just stops the fleet + the cockpit goes down.
function renderChrome(){ const b=document.getElementById("shutdownbtn"); if(b) b.textContent="⏻ "+t("shutdown"); }
async function doShutdown(){
  if(!confirm(t("shutdown.confirm"))) return;
  const b=document.getElementById("shutdownbtn"); if(b){ b.disabled=true; b.textContent=t("shutdown.stopping"); }
  try{ const r=await api("/api/shutdown",{method:"POST"}); toast(t("shutdown.done"));
    document.getElementById("main").innerHTML=`<div class="card" style="max-width:480px;margin:40px auto;text-align:center"><h2>${t("shutdown.done")}</h2><p class="muted">${esc((r.detail||"").slice(0,200))}</p></div>`;
  }catch(e){ if(b){ b.disabled=false; renderChrome(); } toast(e.message); }
}
document.getElementById("shutdownbtn").onclick=doShutdown;

// Update check: show a banner with a Download link when a newer release exists (link opens the browser).
async function checkUpdate(){
  try{ const u=await api("/api/update-check"); const bar=document.getElementById("updatebar");
    if(u.update_available){ bar.innerHTML="";
      bar.appendChild(el(`<div class="card" style="margin:0;border-radius:0;display:flex;align-items:center;gap:12px"><span>🎉 ${t("update.available")} <b>${esc(u.latest)}</b> <span class="muted">(${esc(u.current)})</span></span><a href="${esc(u.url)}" class="btn" style="padding:4px 12px">${t("update.download")}</a><a class="muted" style="cursor:pointer;font-size:12px" onclick="document.getElementById('updatebar').innerHTML=''">${t("update.dismiss")}</a></div>`));
    } else bar.innerHTML="";
  }catch{}
}

renderChrome(); pollHealth(); pollAccount(); setInterval(pollHealth,5000); checkUpdate();
// On boot, land on the guided wizard until the first agent is fully up (account → model → agent → approve → start).
(async()=>{ try{ const st=await api("/api/setup/status"); if(!st.first_agent_running) view="setup"; }catch{} render(); })();
</script>
