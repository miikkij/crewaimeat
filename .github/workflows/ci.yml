name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (incl. dev)
        run: uv sync --group dev

      # Format + lint are HARD gates: the tree was formatted and auto-fixed in the adoption commit,
      # and the handful of grandfathered findings carry targeted `# noqa` or sit in the ignore list
      # (see [tool.ruff.lint] in pyproject.toml). New/changed code is also held to these by pre-commit.
      - name: Ruff format (check)
        run: uv run ruff format --check src tests crews

      - name: Ruff lint
        run: uv run ruff check src tests crews

      # The deterministic test floor: no LLM, no network (see [tool.pytest.ini_options]).
      - name: Pytest
        run: uv run pytest
