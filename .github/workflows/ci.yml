name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (incl. dev)
        run: uv sync --group dev

      # Lint + format are ADVISORY until the one-time cleanup lands: ~108 files would be reformatted
      # and ~150 lint findings exist (mostly import-order / unused-import) — all pre-existing, none
      # behavioural. New/changed code is held to both via the pre-commit hook. Once
      # `uv run ruff format src tests crews` and `uv run ruff check --fix src tests crews` have been
      # applied across the tree, drop the two `continue-on-error` lines to make these hard gates.
      - name: Ruff format (check)
        run: uv run ruff format --check src tests crews
        continue-on-error: true

      - name: Ruff lint
        run: uv run ruff check src tests crews
        continue-on-error: true

      # The deterministic test floor: no LLM, no network (see [tool.pytest.ini_options]).
      - name: Pytest
        run: uv run pytest
