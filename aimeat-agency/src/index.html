<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aimeat-agency</title>
<style>
  html,body { margin:0; height:100%; background:#0a0a1a; color:#e8e8f0;
    font:15px -apple-system,Segoe UI,Roboto,sans-serif; display:flex; align-items:center; justify-content:center; }
  .box { text-align:center; max-width:440px; padding:24px; }
  .brand { color:#ff69b4; font-weight:700; font-size:24px; letter-spacing:.3px; margin-bottom:18px; }
  .card { background:#13132a; border:1px solid #23234a; border-radius:14px; padding:22px; text-align:left; }
  label { display:block; font-size:12px; color:#9aa0b4; margin:0 0 6px; }
  select { width:100%; background:#0e0e22; color:#e8e8f0; border:1px solid #2a2a52; border-radius:9px; padding:9px 10px; font-size:14px; }
  ol { margin:14px 0 0; padding-left:20px; color:#c8cad8; line-height:1.7; font-size:14px; }
  .note { color:#9aa0b4; font-size:12px; margin-top:10px; }
  .btn { margin-top:18px; width:100%; border:0; cursor:pointer; color:#fff; font-weight:600; font-size:15px;
    padding:11px; border-radius:10px; background:linear-gradient(90deg,#ff69b4,#a78bfa); }
  .btn:disabled { opacity:.6; cursor:default; }
  .spin { margin:22px auto 0; width:24px; height:24px; border:3px solid rgba(255,255,255,.12);
    border-top-color:#a78bfa; border-radius:50%; animation:s .8s linear infinite; }
  .muted { color:#9aa0b4; margin-top:14px; font-size:13px; }
  .hidden { display:none; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div class="box">
    <div class="brand">aimeat-agency</div>

    <!-- FIRST-RUN GATE: choose language + see what will happen, BEFORE anything runs. -->
    <div id="gate" class="card">
      <label id="lbl-lang">Choose your language</label>
      <select id="lang">
        <option value="en">English</option>
        <option value="fi">Suomi</option>
      </select>
      <div id="plan-title" style="margin-top:16px;font-weight:600"></div>
      <ol id="plan"></ol>
      <div id="plan-note" class="note"></div>
      <button id="begin" class="btn"></button>
    </div>

    <!-- After Begin: silent progress (no console windows pop up). -->
    <div id="progress" class="hidden">
      <div class="spin"></div>
      <div class="muted" id="status">…</div>
    </div>
  </div>

  <script>
    const T = {
      lang:   { en:"Choose your language", fi:"Valitse kielesi" },
      title:  { en:"When you click Begin, here's what happens:", fi:"Kun painat Aloita, tapahtuu näin:" },
      s1:     { en:"It downloads the files it needs (a few minutes, needs an internet connection — first time only).",
                fi:"Ladataan tarvittavat tiedostot (muutama minuutti, vaatii nettiyhteyden — vain ensimmäisellä kerralla)." },
      s2:     { en:"A few small black command windows open and stay open — this is normal. They are the engine that runs your agents. Please don't close them yourself.",
                fi:"Näytölle avautuu muutama pieni musta komentoikkuna, jotka jäävät auki — tämä on normaalia. Ne ovat moottori, joka pyörittää agenttejasi. Älä sulje niitä itse." },
      s3:     { en:"Then the app opens, and you set up your first agent step by step.",
                fi:"Sen jälkeen sovellus avautuu, ja luot ensimmäisen agenttisi vaihe vaiheelta." },
      note:   { en:"Nothing happens until you click Begin. To close everything safely (the windows too), use the “Shut down” button in the app — don't close the windows yourself.",
                fi:"Mitään ei tapahdu ennen kuin painat Aloita. Kun haluat sulkea kaiken turvallisesti (myös komentoikkunat), käytä sovelluksen “Sammuta”-painiketta — älä sulje ikkunoita itse." },
      begin:  { en:"Begin", fi:"Aloita" },
      starting:{ en:"Starting…", fi:"Avataan…" },
    };
    let LANG = localStorage.getItem("agencyLang") || "en";
    const t = (k) => (T[k] && T[k][LANG]) || (T[k] && T[k].en) || k;

    function paint() {
      document.getElementById("lbl-lang").textContent = t("lang");
      document.getElementById("lang").value = LANG;
      document.getElementById("plan-title").textContent = t("title");
      document.getElementById("plan").innerHTML = "<li>"+t("s1")+"</li><li>"+t("s2")+"</li><li>"+t("s3")+"</li>";
      document.getElementById("plan-note").textContent = t("note");
      document.getElementById("begin").textContent = t("begin");
    }
    function showProgress(msg) {
      document.getElementById("gate").classList.add("hidden");
      document.getElementById("progress").classList.remove("hidden");
      document.getElementById("status").textContent = msg || t("starting");
    }
    // The Rust shell calls this to stream provisioning status onto the splash.
    window.agencyStatus = (msg) => { showProgress(msg); };

    const invoke = () => window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke;
    function begin() {
      localStorage.setItem("agencyLang", LANG);
      showProgress(t("starting"));
      const inv = invoke();
      if (inv) inv("begin", { lang: LANG });
    }

    document.getElementById("lang").onchange = (e) => { LANG = e.target.value; localStorage.setItem("agencyLang", LANG); paint(); };
    document.getElementById("begin").onclick = begin;
    paint();

    // Returning users (a language was already chosen): skip the gate and proceed automatically.
    if (localStorage.getItem("agencyLang")) { begin(); }
  </script>
</body>
</html>
