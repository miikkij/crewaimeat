[project]
name = "crewfive"
version = "0.1.0"
description = "AIMEAT × CrewAI integration: a validated crew template (liaison + daemon + live progress + date injection) for connecting CrewAI crews to AIMEAT.io, with example crews."
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "crewai[tools]>=1.14.6",
    "aimeat-crewai>=0.3.4",
    "tavily-python>=0.5.0",
    "python-dotenv>=1.0.1",
    "tzdata",  # zoneinfo tz database (needed on Windows for current-time injection)
]

[project.scripts]
crew = "crewfive.main:run"
crew-runner = "crewfive.runner:run"
crew-demo = "crewfive.demo:run"
research-crew = "crewfive.research_crew:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crewfive"]
