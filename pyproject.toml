[project]
name = "crewfive"
version = "0.1.0"
description = "Hierarkinen 5 agentin C-suite yrityskruu (CrewAI PoC, OpenRouter + Tavily)"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "crewai[tools]>=1.14.6",
    "tavily-python>=0.5.0",
    "python-dotenv>=1.0.1",
]

[project.scripts]
crew = "crewfive.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crewfive"]
